<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background (warm amber, same as IconFrame background) -->
    <rect width="1024" height="1024" fill="#e8b15a"/>

    <!-- Top warm sky -->
    <rect width="1024" height="593" fill="#f1d088"/>

    <!-- Big sun cresting the horizon -->
    <circle cx="512" cy="593" r="225" fill="#c8442a"/>

    <!-- Hard horizon water -->
    <rect y="593" width="1024" height="431" fill="#1a2e3a"/>

    <!-- Subtle wave silhouette -->
    <path d="M 0 716 Q 184 614, 389 675 T 737 655 T 1024 696 L 1024 1024 L 0 1024 Z" fill="#0f1e28"/>

    <!-- Tiny far-off bird marks -->
    <g stroke="#1d1c1a" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M 246 328 q 20 -20 41 0 q 20 -20 41 0"/>
      <path d="M 717 225 q 15 -15 31 0 q 15 -15 31 0"/>
    </g>
  </g>
</svg>
